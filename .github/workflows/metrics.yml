name: Metrics

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  isometric-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
